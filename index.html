<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTGSL - Plataforma de Saneamento Urbano</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@19/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@19/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .dark {
            color-scheme: dark;
        }

        .dark body {
            background-color: #0f172a;
            color: #e2e8f0;
        }

        .light body {
            background-color: #ffffff;
            color: #1e293b;
        }

        /* Smooth transitions */
        * {
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .min-h-screen {
            min-height: 100vh;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
        }

        .flex-1 {
            flex: 1;
        }

        .mt-auto {
            margin-top: auto;
        }
    </style>
</head>
<body class="light">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext } = React;

        // ============ CONTEXTS ============

        // Theme Context
        const ThemeContext = createContext(undefined);

        function ThemeProvider({ children, defaultTheme = 'light' }) {
            const [theme, setTheme] = useState(() => {
                const stored = localStorage.getItem('theme');
                return stored || defaultTheme;
            });

            useEffect(() => {
                const root = document.documentElement;
                document.body.className = theme;
                if (theme === 'dark') {
                    root.classList.add('dark');
                } else {
                    root.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);
            }, [theme]);

            const toggleTheme = () => {
                setTheme(prev => (prev === 'light' ? 'dark' : 'light'));
            };

            return (
                <ThemeContext.Provider value={{ theme, toggleTheme }}>
                    {children}
                </ThemeContext.Provider>
            );
        }

        function useTheme() {
            const context = useContext(ThemeContext);
            if (!context) {
                throw new Error('useTheme must be used within ThemeProvider');
            }
            return context;
        }

        // Language Context
        const LanguageContext = createContext(undefined);

        function LanguageProvider({ children }) {
            const [language, setLanguageState] = useState(() => {
                const stored = localStorage.getItem('language');
                return stored || 'pt';
            });

            useEffect(() => {
                localStorage.setItem('language', language);
            }, [language]);

            const setLanguage = (lang) => {
                setLanguageState(lang);
            };

            return (
                <LanguageContext.Provider value={{ language, setLanguage }}>
                    {children}
                </LanguageContext.Provider>
            );
        }

        function useLanguage() {
            const context = useContext(LanguageContext);
            if (!context) {
                throw new Error('useLanguage must be used within LanguageProvider');
            }
            return context;
        }

        // ============ TRANSLATIONS ============

        const translations = {
            pt: {
                header: {
                    title: 'UTGSL',
                    subtitle: 'Unidade de Gestão de Saneamento Urbano de Luanda',
                },
                footer: {
                    poweredBy: 'Powered by Magestade Pura Digital',
                    allRightsReserved: 'Todos os direitos reservados',
                },
                theme: {
                    light: 'Claro',
                    dark: 'Escuro',
                },
                language: {
                    pt: 'Português',
                    en: 'English',
                },
                home: {
                    description: 'Plataforma de Comando de Saneamento Inteligente para a Unidade de Gestão de Saneamento Urbano de Luanda.',
                },
            },
            en: {
                header: {
                    title: 'UTGSL',
                    subtitle: 'Urban Sanitation Management Unit of Luanda',
                },
                footer: {
                    poweredBy: 'Powered by Magestade Pura Digital',
                    allRightsReserved: 'All rights reserved',
                },
                theme: {
                    light: 'Light',
                    dark: 'Dark',
                },
                language: {
                    pt: 'Português',
                    en: 'English',
                },
                home: {
                    description: 'Smart Sanitation Command Platform for the Urban Sanitation Management Unit of Luanda.',
                },
            },
        };

        // ============ COMPONENTS ============

        function Header() {
            const { theme, toggleTheme } = useTheme();
            const { language, setLanguage } = useLanguage();
            const t = translations[language];

            const [showLanguageMenu, setShowLanguageMenu] = useState(false);

            return (
                <header className="sticky-header border-b border-gray-200 dark:border-gray-800 bg-white dark:bg-slate-900 shadow-sm">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex h-16 items-center justify-between">
                        {/* Logo/Title */}
                        <div className="flex flex-col">
                            <h1 className="text-xl font-bold text-blue-700 dark:text-blue-400">
                                {t.header.title}
                            </h1>
                            <p className="text-xs text-gray-500 dark:text-gray-400">
                                {t.header.subtitle}
                            </p>
                        </div>

                        {/* Right side controls */}
                        <div className="flex items-center gap-2">
                            {/* Theme Toggle */}
                            <button
                                onClick={toggleTheme}
                                className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                                title={theme === 'light' ? 'Modo escuro' : 'Modo claro'}
                            >
                                {theme === 'light' ? (
                                    <svg className="w-5 h-5 text-gray-700" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                                    </svg>
                                ) : (
                                    <svg className="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.536l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.828-2.828a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm.707 5.657a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 1.414l-.707.707zM9 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.536-.464a1 1 0 00-1.414 1.414l.707.707a1 1 0 001.414-1.414l-.707-.707zm2.828-2.828a1 1 0 001.414-1.414L5.586 9.172a1 1 0 00-1.414 1.414l.707.707zM5 5a1 1 0 011.414-1.414L7.121 4.05a1 1 0 01-1.414 1.414L5 5z" clipRule="evenodd"></path>
                                    </svg>
                                )}
                            </button>

                            {/* Language Selector */}
                            <div className="relative">
                                <button
                                    onClick={() => setShowLanguageMenu(!showLanguageMenu)}
                                    className="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"
                                    title="Selecionar idioma"
                                >
                                    <svg className="w-5 h-5 text-gray-700 dark:text-gray-300" fill="currentColor" viewBox="0 0 20 20">
                                        <path fillRule="evenodd" d="M5.5 13a3.5 3.5 0 01-.369-6.98 4 4 0 117.753-1.3A4.5 4.5 0 1113.5 13H11V9.413l1.293 1.293a1 1 0 001.414-1.414l-3-3a1 1 0 00-1.414 0l-3 3a1 1 0 001.414 1.414L9 9.414V13H5.5z" clipRule="evenodd"></path>
                                    </svg>
                                </button>
                                {showLanguageMenu && (
                                    <div className="absolute right-0 mt-2 w-40 bg-white dark:bg-slate-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg z-10">
                                        <button
                                            onClick={() => {
                                                setLanguage('pt');
                                                setShowLanguageMenu(false);
                                            }}
                                            className={`w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 ${
                                                language === 'pt' ? 'bg-blue-50 dark:bg-blue-900 text-blue-700 dark:text-blue-300' : ''
                                            }`}
                                        >
                                            {t.language.pt}
                                        </button>
                                        <button
                                            onClick={() => {
                                                setLanguage('en');
                                                setShowLanguageMenu(false);
                                            }}
                                            className={`w-full text-left px-4 py-2 hover:bg-gray-100 dark:hover:bg-gray-700 border-t border-gray-200 dark:border-gray-700 ${
                                                language === 'en' ? 'bg-blue-50 dark:bg-blue-900 text-blue-700 dark:text-blue-300' : ''
                                            }`}
                                        >
                                            {t.language.en}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </header>
            );
        }

        function Footer() {
            const { language } = useLanguage();
            const t = translations[language];
            const currentYear = new Date().getFullYear();

            return (
                <footer className="border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-slate-800 py-6 mt-auto">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex flex-col items-center justify-center gap-2 text-center text-sm text-gray-600 dark:text-gray-400">
                            <p>
                                © {currentYear} UTGSL. {t.footer.allRightsReserved}.
                            </p>
                            <p className="font-medium text-gray-900 dark:text-gray-200">
                                {t.footer.poweredBy}
                            </p>
                        </div>
                    </div>
                </footer>
            );
        }

        function Home() {
            const { language } = useLanguage();
            const t = translations[language];

            return (
                <div className="w-full">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                        <div className="max-w-2xl mx-auto">
                            <h1 className="text-4xl font-bold text-blue-700 dark:text-blue-400 mb-4">
                                {t.header.title}
                            </h1>
                            <p className="text-lg text-gray-600 dark:text-gray-400 mb-8">
                                {t.header.subtitle}
                            </p>
                            <div className="bg-white dark:bg-slate-800 rounded-lg border border-gray-200 dark:border-gray-700 p-8 shadow-sm">
                                <p className="text-gray-900 dark:text-gray-100 leading-relaxed">
                                    {t.home.description}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <ThemeProvider defaultTheme="light">
                    <LanguageProvider>
                        <div className="flex flex-col min-h-screen bg-white dark:bg-slate-900 text-gray-900 dark:text-gray-100">
                            <Header />
                            <main className="flex-1">
                                <Home />
                            </main>
                            <Footer />
                        </div>
                    </LanguageProvider>
                </ThemeProvider>
            );
        }

        // ============ RENDER ============

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
  </html>
