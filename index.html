<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UTGSL - UN Smart City Command System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family:system-ui; transition:0.3s; }

.dark { background:#050b18; color:#e5e7eb; }
.light { background:#f8fafc; color:#0f172a; }

.zone {
  cursor:pointer;
  transition:0.3s;
}

.low { fill:#22c55e; opacity:0.7; }
.mid { fill:#f59e0b; opacity:0.8; }
.high { fill:#ef4444; opacity:0.9; }

.panel {
  background:rgba(15,23,42,0.9);
  color:white;
  backdrop-filter:blur(12px);
}

.card {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  padding:10px;
  border-radius:10px;
}

.cctv {
  background:#000;
  height:120px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.cctv::after {
  content:"LIVE CCTV FEED";
  position:absolute;
  bottom:5px;
  left:5px;
  font-size:10px;
  color:#22c55e;
}
</style>
</head>

<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ---------------- ZONES ----------------
const zones = [
 {name:"Luanda Centro", x:120, y:80},
 {name:"Viana", x:200, y:100},
 {name:"Cacuaco", x:60, y:120},
 {name:"Kilamba", x:180, y:180},
 {name:"Sambizanga", x:100, y:150},
];

// ---------------- LANG ----------------
const lang = {
 pt:{ title:"Centro ONU - Gestão Urbana", alert:"Alerta", chat:"Assistente", map:"Mapa Operacional" },
 en:{ title:"UN Urban Command System", alert:"Alert", chat:"Assistant", map:"Operational Map" }
};

function App(){

const [dark,setDark]=useState(true);
const [events,setEvents]=useState([]);
const [alerts,setAlerts]=useState([]);
const [mode,setMode]=useState("pt");
const [chat,setChat]=useState([
 {role:"system",text:"Sistema ONU Smart City ativo."}
]);

// ---------------- ENGINE ----------------
useEffect(()=>{

const t = setInterval(()=>{

 const z = zones[Math.floor(Math.random()*zones.length)];
 const sev = Math.random();

 const e = {zone:z.name, sev};

 setEvents(prev=>[e,...prev.slice(0,15)]);

 if(sev>0.75){
  setAlerts(prev=>[
   `⚠ CRITICAL: ${z.name} requires immediate intervention`,
   ...prev.slice(0,6)
  ]);
 }

},3000);

return ()=>clearInterval(t);

},[]);

// ---------------- HEAT ----------------
const heat = (z)=>{
 const c = events.filter(e=>e.zone===z).length;
 if(c>6) return "high";
 if(c>3) return "mid";
 return "low";
};

// ---------------- CHAT ----------------
const send=(t)=>{
 setChat(prev=>[
  ...prev,
  {role:"user",text:t},
  {role:"bot",text:"Request processed by UN Command AI."}
 ]);
};

// ---------------- CCTV SIM ----------------
const CCTV = ({zone})=>(
<div className="cctv">
 <div className="absolute inset-0 bg-gradient-to-r from-black via-gray-900 to-black opacity-80"></div>
 <div className="absolute text-xs text-green-400 p-2">
  {zone} - LIVE MONITORING
 </div>
</div>
);

// ---------------- UI ----------------
return(
<div className={dark?"dark":"light"} style={{height:"100vh",display:"flex"}}>

{/* MAP */}
<div style={{width:"50%",padding:10}}>

<h2 className="font-bold mb-2">
{lang[mode].map}
</h2>

<svg viewBox="0 0 300 300">

{zones.map((z,i)=>(
<circle
 key={i}
 cx={z.x}
 cy={z.y}
 r="28"
 className={`zone ${heat(z.name)}`}
 onClick={()=>send("Incident triggered in "+z.name)}
/>
))}

</svg>

{/* CCTV */}
<div className="grid grid-cols-2 gap-2 mt-3">

{zones.slice(0,4).map((z,i)=>(
<CCTV key={i} zone={z.name}/>
))}

</div>

</div>

{/* COMMAND PANEL */}
<div className="panel w-1/2 flex flex-col">

{/* HEADER */}
<div className="p-3 border-b border-white/10 flex justify-between">
<h1 className="font-bold">
{lang[mode].title}
</h1>

<div className="flex gap-2">

<button onClick={()=>setDark(!dark)} className="text-xs px-2 py-1 bg-gray-700 rounded">
🌙
</button>

<button onClick={()=>setMode(mode==="pt"?"en":"pt")} className="text-xs px-2 py-1 bg-gray-700 rounded">
{mode.toUpperCase()}
</button>

</div>
</div>

{/* ALERTS */}
<div className="p-3 space-y-2">

<h3 className="text-sm text-gray-300">Global Alerts</h3>

{alerts.map((a,i)=>(
<div key={i} className="card text-xs text-red-300">
{a}
</div>
))}

</div>

{/* CHAT */}
<div className="flex-1 p-3 overflow-y-auto space-y-2">

{chat.map((m,i)=>(
<div key={i} className={m.role==="user"?"text-right":""}>
<div className="inline-block px-3 py-2 rounded bg-gray-800 text-xs">
{m.text}
</div>
</div>
))}

</div>

{/* INPUT */}
<div className="p-3 border-t border-white/10 flex">
<input
 className="flex-1 px-2 py-1 text-black"
 placeholder="Command..."
 onKeyDown={(e)=>e.key==="Enter" && send(e.target.value)}
/>
</div>

{/* KPI */}
<div className="p-3 border-t border-white/10 text-xs">

<p>Total Events: {events.length}</p>
<p>Critical Zones: {events.filter(e=>e.sev>0.75).length}</p>

</div>

</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
