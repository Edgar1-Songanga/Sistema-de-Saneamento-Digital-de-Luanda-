<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UTGSL - Executive Smart City Command</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; font-family:system-ui; background:#0b1220; }

.zone {
  cursor:pointer;
  transition:0.4s;
  stroke:#0f172a;
  stroke-width:1;
}

.low { fill:#22c55e; opacity:0.7; }
.medium { fill:#f59e0b; opacity:0.8; }
.high { fill:#ef4444; opacity:0.9; }

.zone:hover {
  transform:scale(1.05);
  filter:brightness(1.2);
}

.glass {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);
}

.panel {
  background:linear-gradient(180deg,#0b1220,#0f172a);
  color:#e5e7eb;
}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ---------------- EXEC ZONES ----------------
const zones = [
 {name:"Luanda Centro", x:120, y:80},
 {name:"Viana", x:200, y:100},
 {name:"Cacuaco", x:60, y:120},
 {name:"Kilamba", x:180, y:180},
 {name:"Sambizanga", x:100, y:150},
];

// ---------------- APP ----------------
function App(){

const [events,setEvents] = useState([]);
const [alerts,setAlerts] = useState([]);
const [kpi,setKpi] = useState({
 pressure:42,
 response:6.2,
 critical:3
});

// ---------------- SIMULATION ENGINE ----------------
useEffect(()=>{

const t = setInterval(()=>{

 const zone = zones[Math.floor(Math.random()*zones.length)];

 const severity = Math.random();

 const event = {
  zone:zone.name,
  severity
 };

 setEvents(prev=>[event,...prev.slice(0,20)]);

// KPI DYNAMICS
 setKpi(prev=>({
  pressure: Math.min(100, prev.pressure + (severity*3)),
  response: Math.max(1, prev.response - (severity*0.1)),
  critical: events.filter(e=>e.severity>0.7).length
 }));

// ALERT ENGINE
 if(severity > 0.75){
  setAlerts(prev=>[
   `⚠ Zona crítica emergente: ${zone.name}`,
   ...prev.slice(0,5)
  ]);
 }

},3500);

return ()=>clearInterval(t);

},[events]);

// ---------------- ZONE STATUS ----------------
const getZoneLevel = (name)=>{
 const count = events.filter(e=>e.zone===name).length;

 if(count > 5) return "high";
 if(count > 2) return "medium";
 return "low";
};

// ---------------- ACTION ----------------
const trigger = (name)=>{
 setEvents(prev=>[
  {zone:name, severity:1},
  ...prev
 ]);
};

// ---------------- UI ----------------
return(
<div className="h-screen flex">

{/* MAPA EXECUTIVO */}
<div className="w-1/2 bg-slate-950 p-4">

<h1 className="text-white font-bold text-lg mb-2">
Smart City Command - Luanda
</h1>

<svg viewBox="0 0 300 300" className="w-full h-full">

{zones.map((z,i)=>(
<circle
 key={i}
 cx={z.x}
 cy={z.y}
 r="28"
 className={`zone ${getZoneLevel(z.name)}`}
 onClick={()=>trigger(z.name)}
/>
))}

</svg>

<p className="text-xs text-gray-400">
Executive Monitoring Layer
</p>

</div>

{/* COMMAND PANEL */}
<div className="w-1/2 panel flex flex-col">

{/* KPI HEADER */}
<div className="p-4 border-b border-white/10">

<h2 className="font-bold text-white">Centro Executivo</h2>

<div className="grid grid-cols-3 gap-3 mt-3 text-xs">

<div className="glass p-2 rounded">
<p>Pressão Urbana</p>
<p className="text-lg">{kpi.pressure.toFixed(0)}</p>
</div>

<div className="glass p-2 rounded">
<p>Tempo Resposta</p>
<p className="text-lg">{kpi.response.toFixed(1)}h</p>
</div>

<div className="glass p-2 rounded">
<p>Crítico</p>
<p className="text-lg">{kpi.critical}</p>
</div>

</div>

</div>

{/* ALERT STREAM */}
<div className="flex-1 overflow-y-auto p-4 space-y-2">

{alerts.length===0 && (
<p className="text-gray-500 text-sm">
Sistema operacional. Sem alertas críticos.
</p>
)}

{alerts.map((a,i)=>(
<div key={i} className="glass p-2 text-sm">
{a}
</div>
))}

</div>

{/* EVENT LOG */}
<div className="p-4 border-t border-white/10 text-xs text-gray-400">

<h3 className="text-white mb-2">Log Operacional</h3>

{events.slice(0,6).map((e,i)=>(
<div key={i}>
{e.zone} - intensidade {e.severity.toFixed(2)}
</div>
))}

</div>

</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
