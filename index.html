<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UTGSL - Plataforma Inteligente de Saneamento</title>

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body { margin:0; }
.chat-scroll::-webkit-scrollbar { width: 6px; }
.chat-scroll::-webkit-scrollbar-thumb { background:#ccc; border-radius:10px; }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const bairros = ["Maianga","Viana","Kilamba","Cacuaco","Sambizanga"];

function App(){

const [messages, setMessages] = useState([
  {from:"bot", text:"Sistema UTGSL activo. Como posso ajudar?"}
]);

const [input, setInput] = useState("");
const [mode, setMode] = useState("menu");
const [dashboard, setDashboard] = useState(false);

const addMessage = (msg)=> setMessages(prev=>[...prev,msg]);

// ---------------- CHAT LOGIC ----------------
const handleSend = ()=>{
 if(!input) return;

 addMessage({from:"user", text:input});

 setTimeout(()=>{
   addMessage({from:"bot", text:generateResponse(input)});
 },800);

 setInput("");
};

const generateResponse = (text)=>{
 text = text.toLowerCase();

 if(text.includes("lixo")) return "Indique o bairro para registar ocorrência.";
 if(text.includes("inund")) return "Situação de drenagem detectada. Indique localização.";
 if(text.includes("estado")) return "Zona em nível moderado. Última recolha há 48h.";
 if(text.includes("operador")) return "A transferir para operador...";
 return "Não compreendido. Use o menu.";
};

// ---------------- INCIDENT ----------------
const createIncident = ()=>{
 const bairro = bairros[Math.floor(Math.random()*bairros.length)];
 const code = "LU-"+Math.floor(Math.random()*100000);

 addMessage({
   from:"bot",
   text:`Ocorrência registada em ${bairro}. Protocolo: ${code}`
 });

 setTimeout(()=>{
   addMessage({from:"bot", text:"Equipa enviada para o local."});
 },2000);
};

// ---------------- DASHBOARD DATA ----------------
const stats = {
 total: Math.floor(Math.random()*5000),
 active: Math.floor(Math.random()*200),
 critical: Math.floor(Math.random()*50)
};

// ---------------- UI ----------------
return(
<div className="h-screen flex flex-col bg-gray-100">

{/* HEADER */}
<header className="bg-white shadow px-4 py-3 flex justify-between">
 <div>
   <h1 className="font-bold text-lg text-green-700">UTGSL</h1>
   <p className="text-xs text-gray-500">Plataforma de Saneamento</p>
 </div>

 <div className="flex gap-2">
   <button onClick={()=>setDashboard(!dashboard)}
     className="px-3 py-1 border rounded text-sm">
     Dashboard
   </button>
 </div>
</header>

{/* DASHBOARD */}
{dashboard && (
<div className="p-4 bg-white shadow grid grid-cols-3 gap-4 text-center">
 <div>
   <h2 className="text-xl font-bold">{stats.total}</h2>
   <p>Total Ocorrências</p>
 </div>
 <div>
   <h2 className="text-xl font-bold">{stats.active}</h2>
   <p>Em curso</p>
 </div>
 <div>
   <h2 className="text-xl font-bold text-red-600">{stats.critical}</h2>
   <p>Zonas críticas</p>
 </div>
</div>
)}

{/* CHAT */}
<div className="flex-1 overflow-y-auto p-4 chat-scroll">

{messages.map((m,i)=>(
<div key={i} className={`mb-3 flex ${m.from==="user"?"justify-end":"justify-start"}`}>
 <div className={`px-4 py-2 rounded-lg max-w-xs ${
   m.from==="user"?"bg-green-600 text-white":"bg-white shadow"
 }`}>
   {m.text}
 </div>
</div>
))}

</div>

{/* MENU */}
<div className="p-3 bg-white border-t flex gap-2 flex-wrap">

<button onClick={()=>addMessage({from:"bot", text:"Descreva o problema de lixo."})}
 className="px-3 py-2 border rounded text-sm">
 Lixo
</button>

<button onClick={()=>addMessage({from:"bot", text:"Descreva problema de drenagem."})}
 className="px-3 py-2 border rounded text-sm">
 Drenagem
</button>

<button onClick={createIncident}
 className="px-3 py-2 border rounded text-sm bg-green-600 text-white">
 Criar Ocorrência
</button>

<button onClick={()=>addMessage({from:"bot", text:"Estado do bairro: moderado."})}
 className="px-3 py-2 border rounded text-sm">
 Estado
</button>

<button onClick={()=>addMessage({from:"bot", text:"Ligando operador..."})}
 className="px-3 py-2 border rounded text-sm">
 Operador
</button>

</div>

{/* INPUT */}
<div className="p-3 bg-white border-t flex">
<input 
 value={input}
 onChange={(e)=>setInput(e.target.value)}
 className="flex-1 border rounded px-3 py-2"
 placeholder="Digite aqui..."
/>

<button onClick={handleSend}
 className="ml-2 px-4 bg-green-600 text-white rounded">
 Enviar
</button>
</div>

</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
