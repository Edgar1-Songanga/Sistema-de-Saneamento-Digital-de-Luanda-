<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UTGSL | Plataforma de Comando de Saneamento Urbano</title>
<script src="https://unpkg.com"></script>
<script src="https://unpkg.com"></script>
<script src="https://unpkg.com"></script>
<script src="https://tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        utgsl: {
          primary: '#0B6E4F',
          primaryDark: '#084B36',
          surface: '#FFFFFF',
          bg: '#F5F7F6',
          gray: {
            50: '#F9FAFB',
            100: '#F3F4F6',
            200: '#E5E7EB',
            300: '#D1D5DB',
            500: '#6B7280',
            700: '#374151',
            900: '#111827'
          }
        }
      },
      fontFamily: {
        sans: ['Inter', 'system-ui', 'sans-serif']
      },
      boxShadow: {
        'glass': '0 8px 32px 0 rgba(11, 110, 79, 0.08)',
        'elevated': '0 4px 24px 0 rgba(17, 24, 39, 0.06)'
      }
    }
  }
}
</script>
<link href="https://googleapis.com" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background: #F5F7F6; }
.glass-effect {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.scroll-smooth { scroll-behavior: smooth; }
.status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity:.5; } }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const SimulationEngine = {
  municipios: ['Luanda', 'Belas', 'Cacuaco', 'Cazenga', 'Viana', 'Talatona'],
  bairros: {
    'Luanda': ['Ingombota', 'Maianga', 'Rangel', 'Samba', 'Sambizanga'],
    'Belas': ['Barra do Kwanza', 'Benfica', 'Futungo', 'Quenguela'],
    'Cacuaco': ['Cacuaco Sede', 'Funda', 'Kicolo'],
    'Cazenga': ['Cazenga', 'Hoji-ya-Henda', 'Tala Hady'],
    'Viana': ['Viana Sede', 'Calumbo', 'Zango'],
    'Talatona': ['Talatona Sede', 'Benfica', 'Camama']
  },
  incidentTypes: [
    { id: 'waste', label: 'Acumulação de resíduos', risk: 'medium' },
    { id: 'drainage', label: 'Drenagem obstruída', risk: 'high' },
    { id: 'flood', label: 'Alagamento', risk: 'critical' },
    { id: 'illegal', label: 'Descarte irregular', risk: 'high' }
  ],
  imageLibrary: {
    waste: ['https://unsplash.com'],
    drainage: ['https://unsplash.com'],
    flood: ['https://unsplash.com'],
    illegal: ['https://unsplash.com']
  },
  generateTicketId: () => `LU-UTGSL-${new Date().getFullYear()}-${Math.floor(Math.random() * 90000) + 10000}`,
  getBairroStatus: (bairro) => {
    const seed = bairro.length;
    return {
      status: seed % 3 === 0 ? 'Critical' : seed % 2 === 0 ? 'Attention Required' : 'Controlled',
      lastCollection: `${seed % 12 + 1}h atrás`,
      activeAlerts: seed % 3
    };
  }
};

const StatusCards = ({ municipio, bairro }) => {
  const [status, setStatus] = useState(null);
  useEffect(() => {
    if (bairro) setStatus(SimulationEngine.getBairroStatus(bairro));
  }, [bairro]);

  if (!status) return null;
  const config = {
    'Controlled': { color: 'bg-utgsl-primary', text: 'Controlado' },
    'Attention Required': { color: 'bg-amber-500', text: 'Atenção' },
    'Critical': { color: 'bg-red-600', text: 'Crítico' }
  };

  return (
    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div className="glass-effect rounded-lg p-5 shadow-glass border border-utgsl-gray-200">
        <div className="text-xs font-medium text-utgsl-gray-500 uppercase mb-2">Nível de Limpeza</div>
        <div className="flex items-center gap-2">
          <div className={`w-3 h-3 rounded-full ${config[status.status].color}`}></div>
          <span className="font-bold text-utgsl-gray-900">{config[status.status].text}</span>
        </div>
      </div>
      <div className="glass-effect rounded-lg p-5 shadow-glass border border-utgsl-gray-200">
        <div className="text-xs font-medium text-utgsl-gray-500 uppercase mb-2">Última Coleta</div>
        <div className="font-bold text-utgsl-gray-900">{status.lastCollection}</div>
      </div>
      <div className="glass-effect rounded-lg p-5 shadow-glass border border-utgsl-gray-200">
        <div className="text-xs font-medium text-utgsl-gray-500 uppercase mb-2">Alertas</div>
        <div className="font-bold text-utgsl-gray-900">{status.activeAlerts} ativos</div>
      </div>
    </div>
  );
};

const Dashboard = () => {
  const [form, setForm] = useState({ municipio: '', bairro: '', tipo: '' });
  const [ticket, setTicket] = useState(null);

  const handleSubmit = () => {
    if (!form.municipio || !form.bairro || !form.tipo) return alert("Preencha todos os campos");
    setTicket(SimulationEngine.generateTicketId());
  };

  return (
    <div className="min-h-screen p-4 md:p-8">
      <header className="max-w-5xl mx-auto mb-8 flex justify-between items-center">
        <div>
          <h1 className="text-2xl font-bold text-utgsl-primary">UTGSL</h1>
          <p className="text-utgsl-gray-500 text-sm">Plataforma de Comando de Saneamento</p>
        </div>
        <div className="text-right">
          <span className="text-xs bg-utgsl-primary/10 text-utgsl-primary px-3 py-1 rounded-full font-medium">SISTEMA ATIVO</span>
        </div>
      </header>

      <main className="max-w-5xl mx-auto">
        <StatusCards municipio={form.municipio} bairro={form.bairro} />

        <div className="bg-white rounded-xl shadow-elevated p-6 border border-utgsl-gray-200">
          <h2 className="text-lg font-semibold mb-6 text-utgsl-gray-900">Registrar Nova Ocorrência</h2>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-utgsl-gray-700 mb-1">Município</label>
                <select 
                  className="w-full p-2.5 rounded-lg border border-utgsl-gray-300 focus:ring-2 focus:ring-utgsl-primary outline-none"
                  onChange={(e) => setForm({...form, municipio: e.target.value, bairro: ''})}
                >
                  <option value="">Selecionar...</option>
                  {SimulationEngine.municipios.map(m => <option key={m} value={m}>{m}</option>)}
                </select>
              </div>

              <div>
                <label className="block text-sm font-medium text-utgsl-gray-700 mb-1">Bairro</label>
                <select 
                  className="w-full p-2.5 rounded-lg border border-utgsl-gray-300 focus:ring-2 focus:ring-utgsl-primary outline-none"
                  disabled={!form.municipio}
                  onChange={(e) => setForm({...form, bairro: e.target.value})}
                >
                  <option value="">Selecionar...</option>
                  {form.municipio && SimulationEngine.bairros[form.municipio].map(b => <option key={b} value={b}>{b}</option>)}
                </select>
              </div>

              <div>
                <label className="block text-sm font-medium text-utgsl-gray-700 mb-1">Tipo de Incidente</label>
                <select 
                  className="w-full p-2.5 rounded-lg border border-utgsl-gray-300 focus:ring-2 focus:ring-utgsl-primary outline-none"
                  onChange={(e) => setForm({...form, tipo: e.target.value})}
                >
                  <option value="">Selecionar...</option>
                  {SimulationEngine.incidentTypes.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
              </div>

              <button 
                onClick={handleSubmit}
                className="w-full bg-utgsl-primary hover:bg-utgsl-primaryDark text-white font-bold py-3 rounded-lg transition-colors"
              >
                Gerar Ticket de Comando
              </button>
            </div>

            <div className="bg-utgsl-gray-50 rounded-lg p-4 flex flex-col justify-center items-center border-2 border-dashed border-utgsl-gray-200">
              {form.tipo ? (
                <img src={SimulationEngine.imageLibrary[form.tipo][0]} className="rounded-lg object-cover h-48 w-full mb-2" alt="Preview" />
              ) : (
                <p className="text-utgsl-gray-500 text-sm text-center">Selecione um tipo de incidente para visualizar a evidência base</p>
              )}
            </div>
          </div>

          {ticket && (
            <div className="mt-6 p-4 bg-green-50 border border-green-200 rounded-lg">
              <p className="text-green-800 font-medium text-center text-sm">
                Protocolo Gerado com Sucesso: <span className="font-mono font-bold">{ticket}</span>
              </p>
            </div>
          )}
        </div>
      </main>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>
</body>
</html>
